seed: 42
experiment_name: static_q1_validation_xlong

data:
  path: data/raw/Dataset_output.csv
  target_column: Out_of_step

outputs:
  root: outputs/static_q1_validation_xlong
  model_dir: outputs/static_q1_validation_xlong/model
  table_dir: outputs/static_q1_validation_xlong/tables
  figure_dir: outputs/static_q1_validation_xlong/figures
  split_dir: outputs/static_q1_validation_xlong/splits

features:
  include_logs: true
  use_engineered: true

benchmark:
  n_seeds: 7
  split_strategies: [stratified, grouped, leave_S, leave_I]

scenario:
  main_model_id: proposed_physics_model
  n_seeds: 7
  base_strategy: stratified
  regime_strategies: [grouped, leave_S, leave_I]
  heatmap_grid: 150
  monotonic_step_frac: 0.02
  monotonic_n_samples: 1200
  counterfactual_max_examples: 120

strict_eval:
  test_size: 0.2
  val_size: 0.2
  enforce_no_test_tuning: true
  save_split_indices: true
  save_seed_manifest: true

training_budget:
  n_trials: 60
  max_epochs: 600
  patience: 60
  early_stopping: true
  batch_size: 256
  learning_rate: 0.001

thresholds:
  c_fn: 10.0
  c_fp: 1.0
  min_recall: 0.95

robustness:
  noise:
    Tag_rate: 0.01
    Ikssmin_kA: 0.02
    Sgn_eff_MVA: 0.02
    H_s: 0.01
  missing_feature: Sgn_eff_MVA


